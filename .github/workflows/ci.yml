name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'  # 每日 02:00 UTC 跑 nightly e2e（避開 Devnet 抖動影響 PR gate）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Move smart-contract tests ─────────────────────────────────────────────
  move-test:
    name: Move Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve latest Sui testnet release
        id: sui
        run: |
          DATA=$(curl -sSL \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/MystenLabs/sui/releases?per_page=30")
          TAG=$(echo "$DATA" | jq -r \
            '[.[] | select(.tag_name | startswith("testnet-v"))] | .[0].tag_name')
          URL=$(echo "$DATA" | jq -r \
            '[.[] | select(.tag_name | startswith("testnet-v"))] | .[0].assets[]
             | select(.name | endswith("ubuntu-x86_64.tgz"))
             | .browser_download_url' | head -1)
          echo "tag=$TAG"   >> $GITHUB_OUTPUT
          echo "url=$URL"   >> $GITHUB_OUTPUT

      - name: Cache Sui CLI
        id: cache-sui
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/sui
          key: sui-${{ steps.sui.outputs.tag }}-ubuntu-x86_64

      - name: Install Sui CLI
        if: steps.cache-sui.outputs.cache-hit != 'true'
        run: |
          mkdir -p /tmp/sui-install
          curl -sSfL "${{ steps.sui.outputs.url }}" | tar xz -C /tmp/sui-install
          mkdir -p ~/.local/bin
          find /tmp/sui-install -name 'sui' -type f | head -1 \
            | xargs -I{} cp {} ~/.local/bin/sui
          chmod +x ~/.local/bin/sui

      - name: Add Sui CLI to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Sui CLI
        run: sui --version

      - name: Cache Move dependencies
        uses: actions/cache@v4
        with:
          path: ~/.move
          key: move-deps-${{ hashFiles('contracts/Move.toml') }}
          restore-keys: move-deps-

      - name: Run Move tests
        working-directory: contracts
        run: sui move test

  # ── BFF (stateless) + scripts tests ───────────────────────────────────────
  bff-test:
    name: BFF Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck scripts
        run: pnpm --filter @surveysui/scripts typecheck

      - name: Test scripts
        run: pnpm --filter @surveysui/scripts test

      - name: Typecheck BFF
        run: pnpm --filter @surveysui/bff typecheck

      - name: Test BFF
        run: pnpm --filter @surveysui/bff test

  # ── Frontend: Vitest unit tests + Playwright E2E ─────────────────────────
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck frontend
        run: pnpm --filter @surveysui/frontend typecheck

      - name: Test frontend (Vitest)
        run: pnpm --filter @surveysui/frontend test

      # Playwright e2e 已移至 e2e-nightly job，不在 PR gate 跑
      # 原因：Devnet 抖動會隨機讓 e2e 失敗，阻塞所有 PR merge

  # ── Nightly E2E（只在 schedule trigger 跑，不在 push/PR）──────────────────
  e2e-nightly:
    name: Nightly E2E (Devnet)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      SUI_NETWORK: devnet
      SUI_RPC_URL: https://fullnode.devnet.sui.io:443
      SUI_PACKAGE_ID: ${{ secrets.SUI_PACKAGE_ID }}
      AMM_POOL_ID: ${{ secrets.AMM_POOL_ID }}
      SR_TREASURY_ID: ${{ secrets.SR_TREASURY_ID }}
      SSR_TREASURY_ID: ${{ secrets.SSR_TREASURY_ID }}
      SURVEY_REGISTRY_ID: ${{ secrets.SURVEY_REGISTRY_ID }}
      PASS_REGISTRY_ID: ${{ secrets.PASS_REGISTRY_ID }}
      SUI_ADMIN_PRIVATE_KEY: ${{ secrets.SUI_ADMIN_PRIVATE_KEY }}
      BFF_URL: http://localhost:3100
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Start BFF (background)
        run: |
          SUI_PACKAGE_ID=$SUI_PACKAGE_ID \
          SUI_RPC_URL=$SUI_RPC_URL \
          PORT=3100 \
          pnpm --filter @surveysui/bff start &
          sleep 5

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright with system deps
        run: pnpm --filter @surveysui/frontend exec playwright install --with-deps chromium

      - name: Test E2E Playwright (Devnet)
        run: pnpm --filter @surveysui/frontend test:e2e
