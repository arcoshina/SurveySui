<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style id="anti-flash-style">
      *, *::before, *::after {
        transition: none !important;
        animation-duration: 0s !important;
        animation-delay: 0s !important;
      }
    </style>
    <script>
      (function() {
        const theme = localStorage.getItem('surveysui:theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <script>
      // 在 React 載入前依 ?lang / localStorage / 系統語言預設 html lang，避免首屏閃動
      (function() {
        const url = new URLSearchParams(location.search).get('lang');
        const saved = localStorage.getItem('surveysui:lang');
        const nav = (navigator.language || '').toLowerCase();
        const raw = (url || saved || (nav.indexOf('zh') === 0 ? 'zh' : 'en')).toLowerCase();
        document.documentElement.lang = raw.indexOf('zh') === 0 ? 'zh-TW' : 'en';
      })();
    </script>

    <title>SurveySui — Sui 區塊鏈問卷平台</title>
    <meta
      name="description"
      content="透過 Sui 區塊鏈發起問卷、發放 RWD 代幣獎勵，安全可驗證的去中心化問卷平台。"
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://surveysui.xyz/" />
    <meta property="og:title" content="SurveySui — Sui 區塊鏈問卷平台" />
    <meta
      property="og:description"
      content="透過 Sui 區塊鏈發起問卷、發放 RWD 代幣獎勵，安全可驗證的去中心化問卷平台。"
    />
    <meta property="og:image" content="https://surveysui.xyz/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SurveySui — Sui 區塊鏈問卷平台" />
    <meta
      name="twitter:description"
      content="透過 Sui 區塊鏈發起問卷、發放 RWD 代幣獎勵，安全可驗證的去中心化問卷平台。"
    />
    <meta name="twitter:image" content="https://surveysui.xyz/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 確保在頁面初次渲染完成後移除 anti-flash style，恢復正常的過渡動畫
      window.addEventListener('DOMContentLoaded', () => {
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            const style = document.getElementById('anti-flash-style');
            if (style) style.remove();
          });
        });
      });
    </script>
  </body>
</html>
